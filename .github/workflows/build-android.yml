name: Build Android APK via EAS

on:
  workflow_dispatch:   # Manual trigger only — run from GitHub Actions tab

defaults:
  run:
    working-directory: mobile

jobs:
  build:
    name: EAS Build — Android Production APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: mobile/yarn.lock

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK locally on CI
        env:
          EAS_LOCAL_BUILD_SKIP_CLEANUP: 1
        run: eas build --platform android --profile production --local --non-interactive

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HumanOS-APK
          path: mobile/*.apk
          retention-days: 7
